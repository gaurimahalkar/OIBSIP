<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>

    <link rel="stylesheet" href="style.css">

    <!-- SHA-256 Library -->
    <script src="https://cdn.jsdelivr.net/npm/js-sha256@0.11.0/src/sha256.min.js"></script>

</head>

<body>

<div class="container">

    <!-- Left Section -->

    <div class="left-panel">

        <h1>Create Account</h1>

        <p>
            Register your account and enjoy secure login authentication.
        </p>

        <img src="https://cdn-icons-png.flaticon.com/512/2889/2889676.png"
             alt="Register">

    </div>

    <!-- Right Section -->

    <div class="right-panel">

        <h2>Register</h2>

        <form id="registerForm">

            <div class="input-box">

                <label>Username</label>

                <input
                    type="text"
                    id="username"
                    placeholder="Enter your username">

            </div>

            <div class="input-box">

                <label>Email</label>

                <input
                    type="email"
                    id="email"
                    placeholder="Enter your email">

            </div>

            <div class="input-box">

                <label>Password</label>

                <input
                    type="password"
                    id="password"
                    placeholder="Create your password">

            </div>

            <button type="submit">
                Register
            </button>

            <p id="registerMsg"></p>

        </form>
        <p class="bottom-text">

            Already have an account?

            <a href="index.html">
                Login

            </a>

        </p>

    </div>

</div>

<script src="auth.js"></script>

</body>

</html>
